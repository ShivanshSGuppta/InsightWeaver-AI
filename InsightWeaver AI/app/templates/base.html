<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "InsightWeaver" }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between gap-4">
      <div>
        <div class="text-2xl font-bold tracking-tight">InsightWeaver</div>
        <div class="text-sm text-slate-300">Financial data extraction • Schema inference • Normalization • Dashboards</div>
      </div>
      <div class="text-xs text-slate-400 text-right">
        <div>FastAPI • Pandas • Tailwind</div>
      </div>
    </div>

    <nav class="mt-4 flex flex-wrap gap-2 text-sm">
      <a class="navlink" href="/">Home</a>
      <a class="navlink" href="/runs">Runs</a>
      <a class="navlink" href="/help">Help</a>
      <a class="navlink" href="/sample/run">Run Sample Dataset</a>
    </nav>

    <div class="mt-4">
      {% block content %}{% endblock %}
    </div>

    <footer class="mt-10 text-xs text-slate-400">
      <div class="border-t border-slate-800 pt-4">
        Tip: Use this as a portfolio project; README includes full deployment instructions.
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
